name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # pełna historia — potrzebna do zbudowania notatek

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -p "test_*.py" -v

      - name: Check tag matches __version__
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(python -c 'import exif_cli; print(exif_cli.__version__)')"
          echo "tag=$tag  __version__=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::Tag ($tag) nie zgadza się z exif_cli.__version__ ($ver)"
            exit 1
          fi

      - name: Build release notes
        run: |
          tag="${GITHUB_REF_NAME}"
          prev="$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)"
          if [ -n "$prev" ]; then
            range="${prev}..${tag}"
            header="## Zmiany od ${prev}"
          else
            range="${tag}"
            header="## Zmiany"
          fi
          {
            echo "$header"
            echo
            git log --no-merges --pretty='- %s' "$range"
            echo
            echo "**Pełny changelog:** [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${tag}/CHANGELOG.md)"
          } > RELEASE_NOTES.md
          echo "----- podgląd -----"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
